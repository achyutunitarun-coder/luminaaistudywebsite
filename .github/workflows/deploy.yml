name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main  # deploy whenever main is updated

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout the repo
      - name: Checkout code
        uses: actions/checkout@v3

      # 2️⃣ Install Supabase CLI
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest  # can pin to a stable version if needed

      # 3️⃣ Debug: show CLI version
      - name: Supabase CLI version
        run: supabase --version

      # 4️⃣ Debug: list functions to confirm CLI can see them
      - name: List Supabase Functions
        run: supabase functions list --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      # 5️⃣ Deploy all functions
      - name: Deploy all Edge Functions
        run: supabase functions deploy --all --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
