name: Deploy to Lovable

# Trigger on pushes to the main branch (or whatever branch you connected to Lovable)
on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository
      - name: Checkout code
        uses: actions/checkout@v3

      # Step 2: Optional build step if your app requires building (e.g., npm build)
      - name: Build app
        run: |
          npm install
          npm run build

      # Step 3: Deployment is handled automatically by Lovable via GitHub integration
      - name: Notify deployment
        run: echo "Changes pushed to main — Lovable will deploy automatically!"
