name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'supabase/functions/**'
      - 'supabase/config.toml'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Test API connectivity
        run: |
          echo "=== Testing API connectivity ==="
          curl -v "https://api.supabase.com/v1/projects/${{ secrets.SUPABASE_PROJECT_ID }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" 2>&1
          
      - name: List functions
        run: |
          curl -s "https://api.supabase.com/v1/projects/${{ secrets.SUPABASE_PROJECT_ID }}/functions" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ACCESS_TOKEN }}" | head -c 500
